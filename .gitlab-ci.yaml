image: node:24.10.0-alpine

workflow:
    rules:
        -   if: $CI_COMMIT_BRANCH =~ /^release.*/

default:
    before_script:
        - npm i -g firebase-tools
        - npm i

stages:
    - build
    - test
    - deploy

### JOBS ###

build:
    stage: build
    script:
        - npm run unsafe:build
    artifacts:
        paths:
            - dist/
        expire_in: 2 mins 30 sec

audit:
    stage: test
    script:
        - npm audit
    dependencies:
        - build

lint:
    stage: test
    script:
        - npm run unsafe:lint
    dependencies:
        - audit

deploy:
    stage: deploy
    environment: production
    script:
        - npm config set //registry.npmjs.org/:_authToken "${NPM_SOLIDWEATHER_ACCESS_TOKEN}"
        - npm publish --access public
    dependencies:
        - lint